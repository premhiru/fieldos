name: Bug report
description: Report a reproducible FieldOS defect.
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Purpose: Capture reproducible defects.
        Owner: Engineering
        Status: Draft
        Last Updated: 2026-06-30
        Table of Contents: Summary, Environment, Steps, Expected, Actual, Impact
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
