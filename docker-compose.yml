services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fieldos
      POSTGRES_USER: fieldos
      POSTGRES_PASSWORD: fieldos
    ports:
      - "5432:5432"
    volumes:
      - fieldos-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldos -d fieldos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - fieldos-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fieldos-postgres:
  fieldos-redis:
